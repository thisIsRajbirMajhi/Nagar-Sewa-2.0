name: Build & Distribute APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        if: hashFiles('test/') != ''
        run: flutter test --coverage

      - name: Upload coverage
        if: hashFiles('test/') != '' && always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build-apk-docker:
    name: Build APK (Docker)
    runs-on: ubuntu-latest
    needs: analyze
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder_key' }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY || 'placeholder_key' }}
          GOOGLE_CLOUD_API_KEY=${{ secrets.GOOGLE_CLOUD_API_KEY || 'placeholder_key' }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY || 'placeholder_key' }}
          DEFAULT_LANGUAGE=hi
          EOF

      - name: Build Docker image
        run: |
          docker build -t nagar-sewa-builder:${{ github.sha }} \
            --build-arg BUILD_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            .

      - name: Build APK (Debug)
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/build:/app/build \
            nagar-sewa-builder:${{ github.sha }} \
            flutter build apk --debug

      - name: Build APK (Release)
        if: github.ref == 'refs/heads/main' || github.event.inputs.build_type == 'release'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/build:/app/build \
            nagar-sewa-builder:${{ github.sha }} \
            flutter build apk --release

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nagar-sewa-apk
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 30

      - name: Get APK Info
        id: apk_info
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk -name "app-*.apk" -type f | head -1)
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: v${{ github.run_number }}
          body: |
            ## Build Info
            - Build Date: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            - APK Size: ${{ steps.apk_info.outputs.apk_size }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-apk-native:
    name: Build APK (Native - Backup)
    runs-on: ubuntu-latest
    needs: analyze
    if: failure() || github.event.inputs.build_type == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder_key' }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY || 'placeholder_key' }}
          GOOGLE_CLOUD_API_KEY=${{ secrets.GOOGLE_CLOUD_API_KEY || 'placeholder_key' }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY || 'placeholder_key' }}
          DEFAULT_LANGUAGE=hi
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: nagar-sewa-apk-native
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
