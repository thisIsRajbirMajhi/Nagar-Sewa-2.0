name: Build & Release APK

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.x"
  JAVA_VERSION: "21"

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        if: hashFiles('test/') != ''
        run: flutter test --coverage --no-test-assets

      - name: Upload coverage
        if: hashFiles('test/') != '' && always()
        uses: codecov/codecov-action@v3
        with:
          files: coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    permissions:
      contents: read
      packages: read
    outputs:
      apk-path: ${{ steps.build.outputs.apk_path }}
      apk-size: ${{ steps.build.outputs.apk_size }}
      build-version: ${{ steps.build.outputs.build_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Create .env file
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_CLOUD_API_KEY=${{ secrets.GOOGLE_CLOUD_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          DEFAULT_LANGUAGE=hi
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - name: Decode signing key
        id: decode_key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}" | base64 -d > android/app/keystore.jks
          echo "keystore_path=android/app/keystore.jks" >> $GITHUB_OUTPUT

      - name: Create signing.properties
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cat > android/signing.properties << EOF
          keyStoreFile=keystore.jks
          keyStorePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build APK (Debug)
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
        run: flutter build apk --debug --verbose

      - name: Build APK (Release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: flutter build apk --release --verbose

      - name: Build AAB (Release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: flutter build appbundle --release --verbose

      - name: Get build outputs info
        id: build
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          else
            APK_PATH=$(find build/app/outputs/flutter-apk -name "app-*.apk" | head -1)
          fi
          
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
            echo "build_version=${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
            echo "APK built successfully: $APK_PATH ($APK_SIZE)"
          else
            echo "::error::No APK found"
            exit 1
          fi

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload release APK to artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB to artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: aab-release
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk-release

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: aab-release

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --oneline --pretty=format:"- %h: %s" | head -20)
          else
            CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --oneline --pretty=format:"- %h: %s")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-release.apk
            app-release.aab
          tag_name: v${{ needs.build.outputs.build-version }}
          name: Release ${{ needs.build.outputs.build-version }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Build Details
            - **Version**: ${{ needs.build.outputs.build-version }}
            - **APK Size**: ${{ needs.build.outputs.apk-size }}
            - **Build Date**: ${{ github.event.head_commit.timestamp }}
            - **Commit**: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - **Branch**: ${{ github.ref_name }}

            ## Installation
            Download the APK and install on your device:
            ```bash
            adb install -r app-release.apk
            ```

            Or use the AAB for Google Play Store submission.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [build, release]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build succeeded"
            echo "APK Size: ${{ needs.build.outputs.apk-size }}"
          else
            echo "❌ Build failed"
            exit 1
          fi
